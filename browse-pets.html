<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurEver Home - Browse Pets</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/browse.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">🐾 FurEver <span>Home</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="user-dashboard.html">Dashboard</a></li>
            <li><a href="login.html" class="btn btn-secondary btn-small">Login</a></li>
            <li><a href="register.html" class="btn btn-primary btn-small">Register</a></li>
        </ul>
    </nav>

    <!-- Page Banner -->
    <div class="page-banner">
        <h1>🐾 Browse Available Pets</h1>
        <p>Find your perfect furry companion from our shelters</p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="form-group">
            <label for="search">Search by Name</label>
            <input type="text" id="search" placeholder="e.g. Buddy, Luna...">
        </div>
        <div class="form-group">
            <label for="pet-type">Pet Type</label>
            <select id="pet-type">
                <option value="">All Types</option>
                <option>Dog</option>
                <option>Cat</option>
                <option>Rabbit</option>
                <option>Bird</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age-range">Age</label>
            <select id="age-range">
                <option value="">Any Age</option>
                <option>Under 1 Year</option>
                <option>1–3 Years</option>
                <option>3–7 Years</option>
                <option>7+ Years</option>
            </select>
        </div>
        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
                <option value="">Any</option>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="applyFilters()">Search 🔍</button>
    </div>

    <!-- Pets Grid -->
    <div class="pets-section">
        <p class="results-info">Showing 6 pets available for adoption</p>

        <div class="pets-grid" id="petsGrid">

            
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">›</button>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>🐾 FurEver Home &copy; 2025 | Made with love for every furry soul 💕</p>
    </footer>

</body>
<script>
    let currentPage    = 1;
    let activeFilters  = {};

    function loadPets(page, filters) {
        currentPage   = page;
        activeFilters = filters || {};

        const url = `api/browse_pets.php?page=${page}`;

        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(activeFilters)
        })
        .then(r => r.json())
        .then(data => {
            const { pets, total, totalPages } = data;
            const grid = document.getElementById("petsGrid");
            grid.innerHTML = "";

            document.querySelector(".results-info").textContent =
                total === 0
                    ? "No pets found"
                    : `Showing ${pets.length} of ${total} pets`;

            if (pets.length === 0) {
                grid.innerHTML = "<p>No pets found \uD83D\uDE22</p>";
                buildPagination(0);
                return;
            }

            pets.forEach(pet => {
                const badgeClass = pet.availability === "available"
                    ? "badge-available" : "badge-pending";
                const btnClass   = pet.availability === "available"
                    ? "btn-primary"    : "btn-secondary";
                const imagePath  = "/furever-home-with-sessions/" + pet.image_url;

                grid.innerHTML += `
                    <div class="pet-card">
                        <div class="pet-img">
                            <img src="${imagePath}" alt="${pet.name}">
                        </div>
                        <div class="pet-info">
                            <h3>${pet.name}</h3>
                            <p class="pet-meta">
                                ${pet.type} | ${pet.breed} | ${pet.age} | ${pet.gender}
                            </p>
                            <p>${pet.description}</p>
                            <div class="pet-footer">
                                <span class="badge ${badgeClass}">${pet.availability}</span>
                                <a href="pet-details.html?id=${pet.id}"
                                   class="btn ${btnClass} btn-small">View Details</a>
                            </div>
                        </div>
                    </div>`;
            });

            buildPagination(totalPages);
        });
    }

    function buildPagination(totalPages) {
        const nav = document.getElementById("pagination");
        nav.innerHTML = "";

        if (totalPages <= 1) return;

        const prev = document.createElement("button");
        prev.className = "page-btn";
        prev.textContent = "‹";
        prev.disabled = currentPage === 1;
        prev.onclick = () => loadPets(currentPage - 1, activeFilters);
        nav.appendChild(prev);

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement("button");
            btn.className = "page-btn" + (i === currentPage ? " active" : "");
            btn.textContent = i;
            btn.onclick = () => loadPets(i, activeFilters);
            nav.appendChild(btn);
        }

        const next = document.createElement("button");
        next.className = "page-btn";
        next.textContent = "›";
        next.disabled = currentPage === totalPages;
        next.onclick = () => loadPets(currentPage + 1, activeFilters);
        nav.appendChild(next);
    }

    function applyFilters() {
        const filters = {
            search: document.getElementById("search").value.trim(),
            type:   document.getElementById("pet-type").value,
            age:    document.getElementById("age-range").value,
            gender: document.getElementById("gender").value
        };
        loadPets(1, filters); // always reset to page 1 on new filter
    }

    document.addEventListener("DOMContentLoaded", () => loadPets(1, {}));
</script>
</html>
