<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurEver Home - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="loader" class="loader-overlay" style="display:none;">
        <div class="loader-spinner"></div>
        <p class="loader-text">Loading... 🐾</p>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">🐾 FurEver <span>Home</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="browse-pets.html">Browse Pets</a></li>
            <li><a href="register.html" class="btn btn-primary btn-small">Register</a></li>
        </ul>
    </nav>

    <!-- Login Form -->
    <div class="login-wrapper">
        <div class="login-box">

            <div class="login-icon">🐾</div>
            <h2>Welcome Back!</h2>
            <p class="subtitle">Log in to continue your adoption journey</p>

            <!-- Role Selection -->
            <div class="role-selector">
                <button class="role-btn active">Adopter</button>
                <button class="role-btn">Shelter Staff</button>
                <button class="role-btn">Admin</button>
            </div>

            <form onsubmit="login(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

            </form>

            <a href="#" class="forgot-link">Forgot your password?</a>

            <div class="divider">— or —</div>

            <p class="register-prompt">
                Don't have an account? <a href="register.html">Register here</a>
            </p>

        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>🐾 FurEver Home &copy; 2025 | Made with love for every furry soul 💕</p>
    </footer>
<script>

let selectedRole = "adopter";

document.querySelectorAll(".role-btn").forEach(btn => {
    btn.addEventListener("click", function() {

        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        selectedRole = this.innerText.toLowerCase().replace(" ", "-");
    });
});

function login(event){
    event.preventDefault();

    let form = new FormData();

    form.append("email", document.getElementById("email").value);
    form.append("password", document.getElementById("password").value);
    form.append("role", selectedRole);

    fetch("api/login.php", {
        method: "POST",
        body: form
    })
    .then(res => res.text())
    .then(msg => {

        if(msg.trim() === "adopter"){
            document.getElementById("loader").style.display = "flex";
            setTimeout(() => { window.location = "user-dashboard.html"; }, 1500);
        }
        else if(msg.trim() === "shelter-staff"){
            document.getElementById("loader").style.display = "flex";
            setTimeout(() => { window.location = "shelter-dashboard.html"; }, 1500);
        }
        else if(msg.trim() === "admin"){
            document.getElementById("loader").style.display = "flex";
            setTimeout(() => { window.location = "admin-panel.html"; }, 1500);
        }
        else{
            alert("Invalid login");
        }

    });
}
</script>
</body>
</html>
