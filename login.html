<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurEver Home - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: var(--pink-light);
        }

        .login-box {
            background-color: var(--white);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 6px 20px var(--shadow);
            text-align: center;
        }

        .login-box .login-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .login-box h2 {
            margin-bottom: 6px;
        }

        .login-box .subtitle {
            font-size: 0.88rem;
            color: var(--text-light);
            margin-bottom: 28px;
        }

        .login-box .form-group {
            text-align: left;
        }

        .login-box .btn {
            width: 100%;
            margin-top: 8px;
            font-size: 1rem;
            padding: 12px;
        }

        .login-box .forgot-link {
            display: block;
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .login-box .forgot-link:hover {
            color: var(--pink-dark);
        }

        .divider {
            margin: 20px 0;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .register-prompt {
            margin-top: 18px;
            font-size: 0.88rem;
            color: var(--text-mid);
        }

        .register-prompt a {
            color: var(--pink-dark);
            font-weight: bold;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            justify-content: center;
        }

        .role-btn {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid var(--pink-main);
            border-radius: 30px;
            background: transparent;
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--text-mid);
            font-family: Georgia, serif;
            transition: all 0.2s;
        }

        .role-btn.active,
        .role-btn:hover {
            background-color: var(--pink-dark);
            color: var(--white);
            border-color: var(--pink-dark);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">🐾 FurEver <span>Home</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="browse-pets.html">Browse Pets</a></li>
            <li><a href="register.html" class="btn btn-primary btn-small">Register</a></li>
        </ul>
    </nav>

    <!-- Login Form -->
    <div class="login-wrapper">
        <div class="login-box">

            <div class="login-icon">🐾</div>
            <h2>Welcome Back!</h2>
            <p class="subtitle">Log in to continue your adoption journey</p>

            <!-- Role Selection -->
            <div class="role-selector">
                <button class="role-btn active">Adopter</button>
                <button class="role-btn">Shelter Staff</button>
                <button class="role-btn">Admin</button>
            </div>

            <form onsubmit="login(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

            </form>

            <a href="#" class="forgot-link">Forgot your password?</a>

            <div class="divider">— or —</div>

            <p class="register-prompt">
                Don't have an account? <a href="register.html">Register here</a>
            </p>

        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>🐾 FurEver Home &copy; 2025 | Made with love for every furry soul 💕</p>
    </footer>
<script>

let selectedRole = "adopter";

document.querySelectorAll(".role-btn").forEach(btn => {
    btn.addEventListener("click", function() {

        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        selectedRole = this.innerText.toLowerCase().replace(" ", "-");
    });
});

function login(event){
    event.preventDefault();

    let form = new FormData();

    form.append("email", document.getElementById("email").value);
    form.append("password", document.getElementById("password").value);
    form.append("role", selectedRole);

    fetch("api/login.php", {
        method: "POST",
        body: form
    })
    .then(res => res.text())
    .then(msg => {

        if(msg.trim() === "adopter"){
            window.location = "index.html";
        }
        else if(msg.trim() === "shelter-staff"){
            window.location = "pet-details.html";
        }
        else if(msg.trim() === "admin"){
            window.location = "admin-panel.html";
        }
        else{
            alert("Invalid login");
        }

    });
}
</script>
</body>
</html>
